<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>购物车</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;padding-top:50px;padding-bottom:120px;font-family:"微软雅黑";}
.head{
position:fixed;top:0;left:0;width:100%;height:50px;
background:#ff4a4a;color:#fff;text-align:center;line-height:50px;font-size:18px;
}
.back{position:absolute;left:15px;top:0;line-height:50px;cursor:pointer;font-size:20px;}
.clear-btn{position:absolute;right:15px;font-size:14px;cursor:pointer;}
.empty{text-align:center;margin-top:100px;color:#999;font-size:16px;}
.cart-item{
background:#fff;margin:10px 15px;border-radius:10px;
display:flex;padding:12px;align-items:center;
}
.cart-img{width:70px;height:70px;border-radius:8px;object-fit:cover;}
.cart-info{flex:1;margin-left:12px;}
.cart-name{font-size:15px;color:#333;margin-bottom:4px;}
.cart-price{font-size:16px;color:red;font-weight:bold;}
.num-box{display:flex;align-items:center;gap:8px;margin-top:6px;}
.num-btn{width:24px;height:24px;border:1px solid #ddd;background:#fff;border-radius:4px;cursor:pointer;}
.num{font-size:14px;width:20px;text-align:center;}
.total{
position:fixed;bottom:60px;left:0;width:100%;
background:#fff;padding:12px 15px;
display:flex;justify-content:space-between;align-items:center;
border-top:1px solid #eee;
}
.total-price{color:red;font-size:16px;font-weight:bold;}
.btn-pay{
background:#ff4a4a;color:#fff;border:none;
padding:8px 20px;border-radius:20px;font-size:14px;cursor:pointer;
}
.footer-tab{
position:fixed;bottom:0;left:0;width:100%;height:60px;
background:#fff;display:flex;border-top:1px solid #eee;
}
.tab-item{flex:1;text-align:center;padding-top:8px;color:#666;font-size:12px;cursor:pointer;}
.tab-item.active{color:#ff4a4a;}
</style>
</head>
<body>
<div class="head">
<span class="back" onclick="goHome()">←</span>购物车
<span class="clear-btn" onclick="clearCart()">清空购物车</span>
</div>

<div id="cartList"></div>

<div class="total">
合计：<span class="total-price" id="totalPrice">¥0.00</span>
<button class="btn-pay" onclick="checkout()">去结算</button>
</div>

<div class="footer-tab">
<div class="tab-item" onclick="goHome()">🏠<br>首页</div>
<div class="tab-item">📋<br>分类</div>
<div class="tab-item active">🛒<br>购物车</div>
<div class="tab-item">👤<br>我的</div>
</div>

<script>
const goodsList = [
  { id: 0, name: "新鲜进口苹果 5斤装", price: 29.9, img: "https://picsum.photos/seed/apple/400/300" },
  { id: 1, name: "网红牛奶酸奶整箱", price: 49.9, img: "https://picsum.photos/seed/milk/400/300" }
];
let cartList = JSON.parse(localStorage.getItem('cartList')) || [{id:0,num:0},{id:1,num:0}];

function renderCart(){
  const listEl = document.getElementById("cartList");
  const priceEl = document.getElementById("totalPrice");
  let total = 0,hasGoods=false,html="";
  cartList.forEach((item,index)=>{
    if(item.num<=0)return;
    hasGoods=true;
    let g = goodsList[index];
    total += g.price*item.num;
    html += `<div class="cart-item">
      <img src="${g.img}" class="cart-img">
      <div class="cart-info">
        <div class="cart-name">${g.name}</div>
        <div class="cart-price">¥${g.price.toFixed(2)}</div>
        <div class="num-box">
          <button class="num-btn" onclick="changeNum(${index},-1)">-</button>
          <span class="num">${item.num}</span>
          <button class="num-btn" onclick="changeNum(${index},1)">+</button>
        </div>
      </div>
    </div>`;
  });
  if(!hasGoods){listEl.innerHTML='<div class="empty">购物车暂无商品</div>';priceEl.innerText="¥0.00";return;}
  listEl.innerHTML=html;priceEl.innerText="¥"+total.toFixed(2);
}
function changeNum(index,n){
  cartList[index].num +=n;
  if(cartList[index].num<0)cartList[index].num=0;
  localStorage.setItem('cartList',JSON.stringify(cartList));renderCart();
}
function clearCart(){
  if(confirm("确定清空全部商品吗？")){
    cartList=[{id:0,num:0},{id:1,num:0}];
    localStorage.setItem('cartList',JSON.stringify(cartList));renderCart();alert("已清空！");
  }
}
function checkout(){
  let total = cartList.reduce((s,i)=>s+i.num,0);
  total?alert("订单提交成功，感谢购买！"):alert("购物车空空如也~");
}
function goHome(){location.href="index.html";}
renderCart();
</script>
</body>
</html>
