<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>购物车</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#f5f5f5;padding-top:50px;padding-bottom:70px;font-family:"微软雅黑";}
.head{
position:fixed;top:0;left:0;width:100%;height:50px;
background:#ff4a4a;color:#fff;text-align:center;
line-height:50px;font-size:18px;
}
.back{position:absolute;left:15px;top:0;line-height:50px;cursor:pointer;}
.empty{text-align:center;margin-top:100px;color:#999;font-size:16px;}
.total{
position:fixed;bottom:60px;left:0;width:100%;
background:#fff;padding:12px 15px;display:flex;
justify-content:space-between;border-top:1px solid #eee;
}
.btn-pay{background:#ff4a4a;color:#fff;border:none;padding:6px 16px;border-radius:15px;}
.footer-tab{
position:fixed;bottom:0;left:0;width:100%;height:60px;
background:#fff;display:flex;border-top:1px solid #eee;
}
.tab-item{flex:1;text-align:center;padding-top:8px;color:#666;font-size:12px;cursor:pointer;}
.tab-item.active{color:#ff4a4a;}
</style>
</head>
<body>

<div class="head">
<span class="back" onclick="goHome()">←</span>购物车
</div>

<div id="content" class="empty">购物车暂无商品</div>

<div class="total">
<div>合计：<span style="color:red;font-weight:bold">¥0.00</span></div>
<button class="btn-pay">去结算</button>
</div>

<div class="footer-tab">
<div class="tab-item" onclick="goHome()">🏠<br>首页</div>
<div class="tab-item">📋<br>分类</div>
<div class="tab-item active">🛒<br>购物车</div>
<div class="tab-item">👤<br>我的</div>
</div>

<script>
let num = parseInt(localStorage.getItem('cartCount')) || 0;
let content = document.getElementById('content');

if(num>0){
content.innerHTML = `<div style="padding:15px;background:#fff;margin:10px;border-radius:10px;">已选购商品共 ${num} 件</div>`;
document.querySelector('.total span').innerText = "¥"+(num*29.9).toFixed(2);
}else{
content.className="empty";
content.innerText="购物车暂无商品";
}

//返回首页
function goHome(){window.location.href="index.html";}
</script>
</body>
</html>
