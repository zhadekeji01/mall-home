<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <!-- 关键：让页面在手机上正常显示 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>移动端商城首页</title>
  <style>
    /* 全局样式重置 保证所有浏览器显示一致 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Microsoft YaHei", sans-serif;
    }

    /* 页面整体背景色 */
    body {
      background-color: #f5f5f5;
    }

    /* ==================== 1. 顶部导航栏 ==================== */
    .nav {
      /* 固定在顶部 */
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background-color: #ff4d4a; /* 商城常用红色 */
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      color: white;
      z-index: 999; /* 保证导航在最上层 */
    }

    /* 导航文字 */
    .nav .title {
      font-size: 16px;
      font-weight: bold;
    }

    /* ==================== 2. 搜索框区域 ==================== */
    .search-box {
      margin-top: 60px; /* 避开顶部导航 */
      padding: 0 15px;
    }

    .search-input {
      width: 100%;
      height: 40px;
      background-color: white;
      border-radius: 20px;
      border: none;
      outline: none;
      padding: 0 15px;
      font-size: 14px;
      color: #666;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
    }

    /* ==================== 3. 轮播图占位 ==================== */
    .swiper {
      margin: 15px;
      height: 150px;
      background-color: white;
      border-radius: 10px;
      /* 居中显示文字 */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #999;
      font-size: 14px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.05);
    }
  </style>
</head>

<body>
  <!-- 顶部导航栏 -->
  <div class="nav">
    <div class="title">商城首页</div>
    <div>消息</div>
  </div>

  <!-- 搜索框 -->
  <div class="search-box">
    <input type="text" class="search-input" placeholder="请输入商品名称搜索" />
  </div>

  <!-- 轮播图占位 -->
  <div class="swiper">轮播图区域（后续可替换为真实轮播）</div>
</body>
</html>
