<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>首页 - 生鲜商城</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#f5f5f5;padding:50px 0 60px 0;}

/* 顶部导航 */
.nav{
position:fixed;top:0;left:0;width:100%;height:50px;
background:#ff4a4a;color:#fff;
display:flex;align-items:center;justify-content:space-between;
padding:0 15px;z-index:999;
}

/* 搜索框（可输入） */
.search{padding:15px 15px;margin-bottom:12px;}
.search input{
width:100%;height:42px;border-radius:21px;border:none;
outline:none;padding:0 18px;font-size:14px;background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* 轮播图（3秒自动切换） */
/* 轮播外层：固定宽高、隐藏溢出 */
.banner-box {
  width: 100%;
  height: 180px;
  overflow: hidden;
  position: relative;
}

/* 轮播列表：横向排列、宽度足够 */
.banner-list {
  display: flex;
  width: 300%;     /* 3张图 = 3倍宽度 */
  height: 100%;
  position: relative;
  left: 0;
  transition: left 0.5s ease;
}

/* 每张图占满容器 */
.banner-list img {
  width: 33.333%;   /* 每张图占轮播列表的1/3 */
  height: 100%;
  object-fit: cover;
}

/* 分类菜单 */
.menu{
background:#fff;margin:0 15px;border-radius:12px;
padding:15px 0;display:flex;justify-content:space-around;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.item{text-align:center;font-size:12px;color:#333;cursor:pointer;}
.item.active{color:red;font-weight:bold;}

/* 商品标题 */
.goods-title{margin:20px 15px 10px;font-size:16px;font-weight:bold;color:#333;}

/* 商品列表 */
.goods-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 15px;}
.goods-card{
background:#fff;border-radius:12px;overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);cursor:pointer;
}
.goods-img{width:100%;height:140px;overflow:hidden;background:#eee;}
.goods-img img{width:100%;height:100%;object-fit:cover;display:block;}
.goods-info{padding:10px;}
.goods-name{font-size:14px;color:#333;margin-bottom:6px;}
.goods-price{font-size:16px;color:red;font-weight:bold;}
.old-price{font-size:12px;color:#999;text-decoration:line-through;margin-left:6px;}
/* 购买按钮（修复：重新添加） */
.buy-btn{
margin-top:8px;width:100%;height:30px;
background:#ff4a4a;color:#fff;border:none;
border-radius:15px;font-size:12px;cursor:pointer;
}
.buy-btn:active{background:#e03e3e;}

/* 底部导航 */
.footer-tab{
position:fixed;bottom:0;left:0;width:100%;height:60px;
background:#fff;display:flex;border-top:1px solid #eee;z-index:999;
}
.tab-item{
flex:1;text-align:center;padding-top:8px;color:#666;font-size:12px;
position:relative;cursor:pointer;
}
.tab-item.active{color:#ff4a4a;}

.cart-badge{
  position:absolute;
  top: 4px;
  right: 50%;
  transform: translateX(30%);
  background:red;color:#fff;
  width:18px;height:18px;border-radius:50%;
  font-size:11px;line-height:18px;text-align:center;
  display:none;
}
.cart-badge.show{display:block;}
</style>
</head>
<body>

<div class="nav">
<div>🏠生鲜商城</div>
<div>🔔消息</div>
</div>

<div class="search">
<input type="text" placeholder="🔍搜索生鲜/零食/水果">
</div>

<!-- 3秒自动轮播图（已修复） -->
<div class="banner-box">
  <div class="banner-list">
    <img src="./images/banner1.jpg">
    <img src="./images/banner2.png">
    <img src="./images/banner3.png">
  </div>
</div>

<div class="menu">
<div class="item" onclick="clickCat(this)">🍎水果</div>
<div class="item" onclick="clickCat(this)">🥤饮料</div>
<div class="item" onclick="clickCat(this)">🍞零食</div>
<div class="item" onclick="clickCat(this)">🎁礼品</div>
</div>

<div class="goods-title">🔥热销商品</div>
<div class="goods-wrap" id="goodsList"></div>

<div class="footer-tab">
<div class="tab-item active" onclick="clickTab(this)">
<div>🏠</div><div>首页</div>
</div>
<div class="tab-item" onclick="clickTab(this)">
<div>📋</div><div>分类</div>
</div>
<div class="tab-item" onclick="goCart()">
<div>🛒</div><div>购物车</div>
<span class="cart-badge" id="cartBadge">0</span>
</div>
<div class="tab-item" onclick="clickTab(this)">
<div>👤</div><div>我的</div>
</div>
</div>

<script>
// 登录拦截
const localUser = localStorage.getItem('loginUser');
const isLogin = sessionStorage.getItem('isLogin');
if(!localUser && !isLogin){
  alert('请先登录');
  location.href='login.html';
}

// 全局商品数据（和详情页、购物车完全统一）
const goodsList = [
  { id: 0, name: "新鲜进口苹果 5斤装", price: 29.9, oldPrice:59.9, img: "./images/apple.jpg", desc:"精选红富士，脆甜多汁，新鲜现摘包邮" },
  { id: 1, name: "网红牛奶酸奶整箱", price: 49.9, oldPrice:79.9, img: "./images/milk.jpg", desc:"营养早餐搭档，常温保存，全家都爱喝" },
  { id: 2, name: "精品香蕉 一把装", price: 19.9, oldPrice:39.9, img: "./images/banana.jpg", desc:"香甜软糯，新鲜直达" },
  { id: 3, name: "进口橙子 10斤装", price: 39.9, oldPrice:69.9, img: "./images/orange.jpg", desc:"富含VC，水润爆汁" }
];

// 读取购物车
let cartList = JSON.parse(localStorage.getItem('cartList')) || [
  { id: 0, num: 0 },
  { id: 1, num: 0 },
  { id: 2, num: 0 },
  { id: 3, num: 0 }
];

// 🔥 核心：动态渲染商品（修复：添加购买按钮+跳转详情）
function renderGoods(){
  let container = document.getElementById('goodsList');
  let html = '';
  goodsList.forEach(good => {
    html += `
    <div class="goods-card" onclick="goDetail(${good.id})">
      <div class="goods-img"><img src="${good.img}"></div>
      <div class="goods-info">
        <div class="goods-name">${good.name}</div>
        <div>
          <span class="goods-price">¥${good.price.toFixed(2)}</span>
          <span class="old-price">¥${good.oldPrice.toFixed(2)}</span>
        </div>
        <button class="buy-btn" onclick="event.stopPropagation();addToCart(${good.id})">立即抢购</button>
      </div>
    </div>
    `;
  });
  container.innerHTML = html;
}

// 加入购物车
function addToCart(goodsId){
  cartList[goodsId].num += 1;
  localStorage.setItem('cartList', JSON.stringify(cartList));
  updateCartBadge();
  alert(`${goodsList[goodsId].name} 已加入购物车！`);
}

// 更新购物车角标
function updateCartBadge(){
  const badge = document.getElementById('cartBadge');
  const total = cartList.reduce((sum, item) => sum + item.num, 0);
  if(total > 0){
    badge.innerText = total;
    badge.classList.add('show');
  } else {
    badge.classList.remove('show');
  }
}

// 跳转详情页（修复：添加跳转逻辑）
function goDetail(id){
  location.href = "detail.html?id="+id;
}

// 跳转购物车
function goCart(){
  window.location.href="cart.html";
}

// 分类切换
function clickCat(el){
  document.querySelectorAll('.item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
}

// 底部Tab切换
function clickTab(el){
  document.querySelectorAll('.tab-item').forEach(x=>x.classList.remove('active'));
  el.classList.add('active');
  if(el.innerText.includes('我的')){
    location.href='mine.html';
  }
}

// 3秒自动轮播
// 完美轮播：每次滚动 100% 宽度，自动循环
const list = document.querySelector('.banner-list');
let idx = 0;

// 确保初始位置正确，防止页面加载时的异常
list.style.left = '0';

// 页面加载完成后开始轮播
document.addEventListener('DOMContentLoaded', () => {
  // 延迟启动轮播，确保页面完全加载
  setTimeout(() => {
    setInterval(() => {
      idx++;
      if (idx > 2) idx = 0;

      // 使用left属性控制轮播位置
      list.style.left = `-${idx * 100}%`;
    }, 3000);
  }, 1000);
});

// 初始化页面
renderGoods();
updateCartBadge();
</script>
</body>
</html>
