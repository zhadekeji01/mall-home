<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>首页 - 动态商品版</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
body{background:#f5f5f5;padding:50px 0 60px 0;}

.nav{
position:fixed;top:0;left:0;width:100%;height:50px;
background:#ff4a4a;color:#fff;
display:flex;align-items:center;justify-content:space-between;
padding:0 15px;z-index:999;
}
.nav.active{background:#222;}

.search{padding:0 15px;margin-bottom:12px;}
.search input{
width:100%;height:42px;border-radius:21px;border:none;
outline:none;padding:0 18px;font-size:14px;background:#fff;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

.banner{margin:0 15px 12px;height:170px;border-radius:12px;overflow:hidden;}
.banner img{width:100%;height:100%;object-fit:cover;}

.menu{
background:#fff;margin:0 15px;border-radius:12px;
padding:15px 0;display:flex;justify-content:space-around;
box-shadow:0 2px 6px rgba(0,0,0,0.06);
}
.item{text-align:center;font-size:12px;color:#333;cursor:pointer;}
.item.active{color:red;font-weight:bold;}

.goods-title{margin:20px 15px 10px;font-size:16px;font-weight:bold;color:#333;}

.goods-wrap{
display:grid;grid-template-columns:1fr 1fr;
gap:12px;padding:0 15px;
}

.goods-card{
background:#fff;border-radius:12px;overflow:hidden;
box-shadow:0 3px 10px rgba(0,0,0,0.08);cursor:pointer;
}
.goods-img{width:100%;height:140px;overflow:hidden;}
.goods-img img{width:100%;height:100%;object-fit:cover;}
.goods-info{padding:10px;}
.goods-name{font-size:14px;color:#333;margin-bottom:6px;}
.goods-price{font-size:16px;color:red;font-weight:bold;}
.old-price{font-size:12px;color:#999;text-decoration:line-through;margin-left:6px;}

.buy-btn{
margin-top:8px;width:100%;height:30px;
background:#ff4a4a;color:#fff;border:none;border-radius:15px;
font-size:12px;cursor:pointer;
}
.buy-btn:active{background:#e03e3e;}

.footer-tab{
position:fixed;bottom:0;left:0;width:100%;height:60px;
background:#fff;display:flex;border-top:1px solid #eee;z-index:999;
}
.tab-item{
flex:1;text-align:center;padding-top:8px;color:#666;font-size:12px;
position:relative;cursor:pointer;
}
.tab-item.active{color:#ff4a4a;}

.cart-badge{
position:absolute;top:4px;right:50%;transform:translateX(30%);
background:red;color:#fff;width:18px;height:18px;border-radius:50%;
font-size:11px;line-height:18px;text-align:center;display:none;
}
.cart-badge.show{display:block;}
</style>
</head>
<body>

<div class="nav" id="topNav" onclick="changeNavColor()">
<div>🏠我的生鲜商城</div>
<div>🔔消息</div>
</div>

<div class="search">
<input type="text" placeholder="🔍搜索商品">
</div>

<div class="banner">
<img src="https://picsum.photos/800/400?random=1" alt="轮播">
</div>

<div class="menu">
<div class="item" onclick="switchCate(this)">🍎水果</div>
<div class="item" onclick="switchCate(this)">🥤饮料</div>
<div class="item" onclick="switchCate(this)">🍞零食</div>
<div class="item" onclick="switchCate(this)">🎁礼品</div>
</div>

<div class="goods-title">🔥热销商品</div>
<div class="goods-wrap" id="goodsList"></div>

<div class="footer-tab">
<div class="tab-item active" onclick="switchTab(this)">
<div>🏠</div><div>首页</div>
</div>
<div class="tab-item" onclick="switchTab(this)">
<div>📋</div><div>分类</div>
</div>
<div class="tab-item" onclick="goCart()">
<div>🛒</div><div>购物车</div>
<span class="cart-badge" id="cartBadge"></span>
</div>
<div class="tab-item" onclick="location.href='mine.html'">
  👤<br>我的
</div>
</div>
</div>

<script>
// 页面加载时检查登录状态
window.onload = function() {
  const user = localStorage.getItem("loginUser");
  if (!user) {
    // 未登录，跳登录页
    location.href = "login.html";
    return;
  }
  // 已登录，正常渲染页面
  renderGoods();
  updateCartBadge();
};  
// 1. 统一商品数据（4个商品，和购物车、详情页完全对齐）
const goodsData = [
  {
    id: 0,
    name: "新鲜进口苹果 5斤装",
    price: 29.9,
    oldPrice: 59.9,
    img: "https://picsum.photos/seed/apple/400/300",
    desc: "精选红富士，脆甜多汁，新鲜现摘包邮"
  },
  {
    id: 1,
    name: "网红牛奶酸奶整箱",
    price: 49.9,
    oldPrice: 79.9,
    img: "https://picsum.photos/seed/milk/400/300",
    desc: "营养早餐搭档，常温保存，全家都爱喝"
  },
  {
    id: 2,
    name: "精品香蕉 一把装",
    price: 19.9,
    oldPrice: 39.9,
    img: "https://picsum.photos/seed/banana/400/300",
    desc: "香甜软糯，新鲜直达"
  },
  {
    id: 3,
    name: "进口橙子 10斤装",
    price: 39.9,
    oldPrice: 69.9,
    img: "https://picsum.photos/seed/orange/400/300",
    desc: "富含VC，水润爆汁"
  }
];

// 2. 购物车数据（4个商品，ID完全对应）
let cartList = JSON.parse(localStorage.getItem('cartList')) || [
  {id:0,num:0},{id:1,num:0},{id:2,num:0},{id:3,num:0}
];

// 3. 动态渲染商品
function renderGoods(){
  let container = document.getElementById('goodsList');
  let html = '';

  goodsData.forEach(good => {
    html += `
    <div class="goods-card" onclick="goDetail(${good.id})">
      <div class="goods-img">
        <img src="${good.img}" alt="${good.name}">
      </div>
      <div class="goods-info">
        <div class="goods-name">${good.name}</div>
        <div>
          <span class="goods-price">¥${good.price.toFixed(2)}</span>
          <span class="old-price">¥${good.oldPrice.toFixed(2)}</span>
        </div>
        <button class="buy-btn" onclick="event.stopPropagation();addToCart(${good.id})">
          立即抢购
        </button>
      </div>
    </div>
    `;
  });

  container.innerHTML = html;
}

// 4. 加入购物车
function addToCart(id){
  cartList[id].num++;
  localStorage.setItem('cartList', JSON.stringify(cartList));
  updateCartBadge();
  alert(`${goodsData[id].name} 已加入购物车！`);
}

// 5. 更新购物车角标
function updateCartBadge(){
  let badge = document.getElementById('cartBadge');
  let total = cartList.reduce((sum,item)=>sum+item.num,0);
  if(total>0){
    badge.innerText=total;
    badge.classList.add('show');
  }else{
    badge.classList.remove('show');
  }
}

// 6. 页面跳转
function goDetail(id){ location.href = "detail.html?id="+id; }
function goCart(){ location.href = "cart.html"; }

// 7. 分类切换
function switchCate(el){
  document.querySelectorAll('.item').forEach(i=>i.classList.remove('active'));
  el.classList.add('active');
}

// 8. 底部Tab切换（修复点击无反应）
function switchTab(el){
  document.querySelectorAll('.tab-item').forEach(t=>t.classList.remove('active'));
  el.classList.add('active');
}

// 9. 顶部导航点击变色
function changeNavColor(){
  const nav = document.getElementById('topNav');
  nav.classList.toggle('active');
}


</script>
</body>
</html>
