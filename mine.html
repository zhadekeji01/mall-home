<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
body{background:#f5f5f5;padding-bottom:60px;}

.top-bar{
  height:50px;
  background:#ff4a4a;
  color:#fff;
  text-align:center;
  line-height:50px;
  font-size:18px;
  position:fixed;
  top:0;
  left:0;
  width:100%;
  z-index:10;
}

.user-card{
  margin-top:50px;
  background:#fff;
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
  margin-bottom:10px;
}
.avatar{
  width:60px;
  height:60px;
  background:#ff4a4a;
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:24px;
}
.user-info h3{font-size:18px;margin-bottom:4px;}
.user-info p{font-size:14px;color:#666;}
.logout-btn{
  margin-left:auto;padding:6px 12px;background:#f5f5f5;
  border:none;border-radius:12px;font-size:14px;cursor:pointer;
}

.order-box{
  background:#fff;
  padding:15px;
}
.order-title{
  font-size:16px;
  font-weight:bold;
  margin-bottom:15px;
}
.order-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:10px;
  text-align:center;
}
.order-item{
  font-size:14px;
  color:#333;
}

.menu-list{
  background:#fff;
  margin-top:10px;
}
.menu-item{
  padding:15px;
  font-size:15px;
  border-bottom:1px solid #f0f0f0;
  cursor:pointer;
}
.menu-item:active{background:#f5f5f5;}

.footer-tab{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  height:60px;
  background:#fff;
  display:flex;
  border-top:1px solid #eee;
  z-index:999;
}
.tab-item{
  flex:1;
  text-align:center;
  padding-top:8px;
  color:#666;
  font-size:12px;
  cursor:pointer;
}
.tab-item.active{color:#ff4a4a;}
</style>
</head>

<body>

<div class="top-bar">个人中心</div>

<div class="user-card">
  <div class="avatar" id="avatar">友</div>
  <div class="user-info">
    <h3 id="username">购物小用户</h3>
    <p>普通会员 · 购物无忧</p>
  </div>
  <button class="logout-btn" onclick="logout()">退出登录</button>
</div>

<div class="order-box">
  <div class="order-title">我的订单</div>
  <div class="order-grid">
    <div class="order-item">全部订单</div>
    <div class="order-item">待付款</div>
    <div class="order-item">待发货</div>
    <div class="order-item">待收货</div>
  </div>
</div>

<div class="menu-list">
  <div class="menu-item" onclick="clearLocal()">清空购物车缓存</div>
  <div class="menu-item">收货地址管理</div>
  <div class="menu-item">帮助与客服</div>
  <div class="menu-item">关于商城</div>
</div>

<div class="footer-tab">
  <div class="tab-item" onclick="location.href='index.html'">🏠<br>首页</div>
  <div class="tab-item" onclick="alert('分类开发中')">📋<br>分类</div>
  <div class="tab-item" onclick="location.href='cart.html'">🛒<br>购物车</div>
  <div class="tab-item active" onclick="location.href='mine.html'">👤<br>我的</div>
</div>

<script>
// 🔧 核心修复：同时读取localStorage（记住我）和sessionStorage（临时登录）
window.onload = function() {
  // 优先读localStorage（记住我），再读sessionStorage（临时登录）
  const localUser = localStorage.getItem("loginUser");
  const sessionUser = sessionStorage.getItem("loginUser");
  const userStr = localUser || sessionUser;

  if (!userStr) {
    alert("请先登录");
    location.href = "login.html";
    return;
  }

  const user = JSON.parse(userStr);
  // 显示用户名
  document.getElementById("username").innerText = user.username;
  // 头像显示首字母
  document.getElementById("avatar").innerText = user.username.charAt(0).toUpperCase();
};

// 清空购物车缓存
function clearLocal(){
  if(confirm('确定清空购物车数据吗？')){
    localStorage.removeItem('cartList')
    alert('已清空缓存')
  }
}

// 退出登录
function logout() {
  if(confirm("确定要退出登录吗？")){
    localStorage.removeItem("loginUser");
    sessionStorage.removeItem("loginUser");
    sessionStorage.removeItem("isLogin");
    alert("已退出登录");
    location.href = "login.html";
  }
}
</script>

</body>
</html>
