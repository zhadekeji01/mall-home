<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>小程序商城首页</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, sans-serif;
    }

    body {
      background: #f5f5f5;
    }

    /* 顶部导航 */
    .nav {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 50px;
      background: #ffb44a;
      color: white;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 15px;
      z-index: 999;
    }

    /* 搜索框 */
    .search {
      margin-top: 60px;
      padding: 0 15px;
    }

    .search input {
      width: 100%;
      height: 42px;
      border-radius: 21px;
      border: none;
      outline: none;
      padding: 0 18px;
      font-size: 14px;
      background: white;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    /* 轮播图 */
    .banner {
      margin: 12px 15px;
      height: 170px;
      background: linear-gradient(45deg, #ea6608fb, #ff8a80);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-size: 16px;
    }

    /* 图标菜单 */
    .menu {
      background: white;
      margin: 0 15px;
      border-radius: 12px;
      padding: 15px 0;
      display: flex;
      justify-content: space-around;
    }

    .item {
      text-align: center;
      font-size: 12px;
      color: #333;
    }

  </style>
</head>
<body>

  <div class="nav">
    <div>🏠 我的生鲜小程序商城</div>
    <div>🔔 消息</div>
  </div>

  <div class="search">
    <input type="text" placeholder="🔍 搜索生鲜/零食/水果">
  </div>

  <div class="banner">
    🎁 限时抢购，全场低至5折！再买五送一！
  </div>

  <div class="menu">
    <div class="item">🍎 水果</div>
    <div class="item">🥤 饮料</div>
    <div class="item">🍞 零食</div>
    <div class="item">🎁 礼品</div>
  </div>

</body>
</html>
