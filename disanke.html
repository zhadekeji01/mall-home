<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>完整版商城首页+底部导航</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑",sans-serif;}
    body{background:#f5f5f5;padding:50px 0 60px 0;}

    /*顶部导航*/
    .nav{
      position:fixed;top:0;left:0;width:100%;height:50px;
      background:#ff4a4a;color:#fff;
      display:flex;align-items:center;justify-content:space-between;
      padding:0 15px;z-index:999;
    }
    .nav.active{background:#222;}

    /*搜索区*/
    .search{padding:0 15px;margin-bottom:12px;}
    .search input{
      width:100%;height:42px;border-radius:21px;border:none;
      outline:none;padding:0 18px;font-size:14px;background:#fff;
      box-shadow:0 2px 6px rgba(0,0,0,0.08);
    }

    /*轮播*/
    .banner{
      margin:0 15px 12px;height:170px;
      background:linear-gradient(45deg,#ff6b6b,#ff8a80);
      border-radius:12px;display:flex;
      align-items:center;justify-content:center;color:#fff;font-size:16px;
    }

    /*分类菜单*/
    .menu{
      background:#fff;margin:0 15px;border-radius:12px;
      padding:15px 0;display:flex;justify-content:space-around;
      box-shadow:0 2px 6px rgba(0,0,0,0.06);
    }
    .item{text-align:center;font-size:12px;color:#333;}
    .item.active{color:red;font-weight:bold;}

    /*商品标题*/
    .goods-title{
      margin:20px 15px 10px;
      font-size:16px;font-weight:bold;color:#333;
    }

    /*商品网格*/
    .goods-wrap{
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:12px;
      padding:0 15px;
    }

    /*美化商品卡片*/
    .goods-card{
      background:#fff;border-radius:12px;overflow:hidden;
      box-shadow:0 3px 10px rgba(0,0,0,0.08);
    }
    .goods-img{
      width:100%;height:140px;background:#f8f8f8;
      display:flex;align-items:center;justify-content:center;color:#999;
      font-size:14px;
    }
    .goods-info{padding:10px;}
    .goods-name{font-size:14px;color:#333;margin-bottom:6px;}
    .goods-price{font-size:16px;color:red;font-weight:bold;}
    .buy-btn{
      margin-top:8px;width:100%;height:30px;
      background:#ff4a4a;color:#fff;border:none;
      border-radius:15px;font-size:12px;
    }

    /*底部固定导航*/
    .footer-tab{
      position:fixed;bottom:0;left:0;width:100%;height:60px;
      background:#fff;display:flex;border-top:1px solid #eee;
      z-index:999;
    }
    .tab-item{
      flex:1;text-align:center;padding-top:8px;color:#666;font-size:12px;
    }
    .tab-item.active{color:#ff4a4a;}
  </style>
</head>
<body>

<div class="nav" id="topNav" onclick="changeNavColor()">
  <div>🏠我的生鲜小程序商城</div>
  <div>🔔消息</div>
</div>

<div class="search">
  <input type="text" placeholder="🔍搜索生鲜/零食/水果">
</div>

<div class="banner">年货特惠 全场低至5折</div>

<div class="menu">
  <div class="item" onclick="clickCat(this)">🍎水果</div>
  <div class="item" onclick="clickCat(this)">🥤饮料</div>
  <div class="item" onclick="clickCat(this)">🍞零食</div>
  <div class="item" onclick="clickCat(this)">🎁礼品</div>
</div>

<div class="goods-title">🔥热销商品</div>
<div class="goods-wrap">
  <div class="goods-card">
    <div class="goods-img">商品图片1</div>
    <div class="goods-info">
      <div class="goods-name">新鲜进口苹果 5斤装</div>
      <div class="goods-price">¥29.9</div>
      <button class="buy-btn" onclick="alert('已加入购物车')">立即抢购</button>
    </div>
  </div>
  <div class="goods-card">
    <div class="goods-img">商品图片2</div>
    <div class="goods-info">
      <div class="goods-name">网红牛奶酸奶整箱</div>
      <div class="goods-price">¥49.9</div>
      <button class="buy-btn" onclick="alert('已加入购物车')">立即抢购</button>
    </div>
  </div>
  <div class="goods-card">
    <div class="goods-img">商品图片3</div>
    <div class="goods-info">
      <div class="goods-name">新鲜进口苹果 吃剩的苹果核</div>
      <div class="goods-price">¥19999.9</div>
      <button class="buy-btn" onclick="alert('已加入购物车')">立即抢购</button>
    </div>
  </div>
</div>

<!-- 底部导航栏 -->
<div class="footer-tab">
  <div class="tab-item active" onclick="clickTab(this)">
    <div>🏠</div>
    <div>首页</div>
  </div>
  <div class="tab-item" onclick="clickTab(this)">
    <div>📋</div>
    <div>分类</div>
  </div>
  <div class="tab-item" onclick="clickTab(this)">
    <div>🛒</div>
    <div>购物车</div>
  </div>
  <div class="tab-item" onclick="clickTab(this)">
    <div>👤</div>
    <div>我的</div>
  </div>
</div>

<script>
// 顶部导航点击变色
function changeNavColor(){
  const nav = document.getElementById('topNav');
  nav.classList.toggle('active');
  alert('你点击了顶部导航！欢迎来到我的商城');
}

// 分类点击高亮
function clickCat(el){
  const allItem = document.querySelectorAll('.item');
  allItem.forEach(item=>item.classList.remove('active'));
  el.classList.add('active');
}

// 底部导航点击高亮（修复新增）
function clickTab(el){
  const allTab = document.querySelectorAll('.tab-item');
  allTab.forEach(tab=>tab.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
