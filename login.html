<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:"微软雅黑";}
body{background:#f5f5f5;display:flex;flex-direction:column;align-items:center;justify-content:center;height:100vh;}

.logo{
  width:80px;height:80px;background:#ff4a4a;border-radius:50%;
  color:#fff;display:flex;align-items:center;justify-content:center;
  font-size:32px;margin-bottom:20px;
}
.login-box{
  width:90%;max-width:400px;background:#fff;padding:30px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,0.1);
}
.login-box h2{text-align:center;margin-bottom:30px;color:#333;}

.form-item{margin-bottom:20px;}
.form-item label{display:block;font-size:14px;color:#666;margin-bottom:8px;}
.form-item input{
  width:100%;height:44px;border:1px solid #ddd;border-radius:8px;
  padding:0 12px;font-size:16px;outline:none;
}
.form-item input:focus{border-color:#ff4a4a;}

.remember{
  display:flex;align-items:center;gap:8px;margin-bottom:25px;
  font-size:14px;color:#666;
}
.remember input{width:auto;height:auto;}

.btn-login{
  width:100%;height:44px;background:#ff4a4a;color:#fff;border:none;
  border-radius:22px;font-size:16px;cursor:pointer;
}
.btn-login:active{background:#e03e3e;}

.tip{text-align:center;margin-top:20px;font-size:14px;color:#999;}
.tip span{color:#ff4a4a;cursor:pointer;}
</style>
</head>
<body>

<div class="logo">🛒</div>
<div class="login-box">
  <h2>用户登录</h2>
  <div class="form-item">
    <label>用户名</label>
    <input type="text" id="username" placeholder="请输入用户名">
  </div>
  <div class="form-item">
    <label>密码</label>
    <input type="password" id="password" placeholder="请输入密码">
  </div>
  <div class="remember">
    <input type="checkbox" id="remember">
    <label for="remember">记住我（7天内自动登录）</label>
  </div>
  <button class="btn-login" onclick="doLogin()">登录</button>
  <div class="tip">还没有账号？<span onclick="alert('注册功能开发中')">立即注册</span></div>
</div>

<script>
// 测试账号：admin / 123456
const TEST_USER = { username: "admin", password: "123456" };

// 页面加载时检查是否记住登录
window.onload = function() {
  const savedUser = localStorage.getItem("loginUser");
  if (savedUser) {
    const user = JSON.parse(savedUser);
    // 自动填充用户名
    document.getElementById("username").value = user.username;
    // 自动登录，直接跳首页
    doLoginAuto(user.username);
  }
};

// 手动登录
function doLogin() {
  const username = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value.trim();
  const remember = document.getElementById("remember").checked;

  // 校验输入
  if (!username || !password) {
    alert("请输入用户名和密码！");
    return;
  }

  // 验证账号密码
  if (username === TEST_USER.username && password === TEST_USER.password) {
    // 记住我逻辑
    if (remember) {
      localStorage.setItem("loginUser", JSON.stringify({ username }));
    } else {
      localStorage.removeItem("loginUser");
    }
    // 登录成功，跳首页
    alert("登录成功！");
    location.href = "index.html";
  } else {
    alert("用户名或密码错误！\n测试账号：admin / 123456");
  }
}

// 自动登录
function doLoginAuto(username) {
  // 直接跳首页，无需验证
  location.href = "index.html";
}
</script>

</body>
</html>
